name: Deploy Site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Pages status
        id: pages_status
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PAGES_ADMIN_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN }}
        run: |
          status_code=$(curl -sS -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages")
          echo "status_code=$status_code" >> "$GITHUB_OUTPUT"

          if [ "$status_code" = "404" ] && [ -z "$PAGES_ADMIN_TOKEN" ]; then
            echo "::error::GitHub Pages is not enabled for this repository. Go to Settings > Pages, set Source to GitHub Actions, save, then rerun this workflow."
            exit 1
          fi

      - name: Configure Pages
        if: steps.pages_status.outputs.status_code != '404'
        uses: actions/configure-pages@v5

      - name: Configure Pages and enable Pages site
        if: steps.pages_status.outputs.status_code == '404'
        uses: actions/configure-pages@v5
        with:
          token: ${{ secrets.PAGES_ADMIN_TOKEN }}
          enablement: true

      - name: Build publish directory
        run: |
          mkdir -p dist
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.history/' \
            --exclude='.augment/' \
            --exclude='.env*' \
            --exclude='node_modules/' \
            --exclude='backend/' \
            --exclude='desktop-app/' \
            --exclude='scripts/' \
            --exclude='config/' \
            --exclude='api/' \
            --exclude='advanced-performance-audit.html' \
            --exclude='crm-standalone.html' \
            --exclude='customer-portal.html' \
            --exclude='debug-google-reviews.html' \
            --exclude='find-place-id.html' \
            --exclude='google-reviews-diagnostic.html' \
            --exclude='live-reviews-test.html' \
            --exclude='performance-test.html' \
            --exclude='seo-validation-suite.html' \
            --exclude='test-*.html' \
            --exclude='assets/js/api-client.js' \
            --exclude='assets/js/crm-dashboard.js' \
            --exclude='*.md' \
            --exclude='*.php' \
            --exclude='*.sh' \
            --exclude='*.bat' \
            --exclude='package*.json' \
            --exclude='render.yaml' \
            ./ dist/
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
